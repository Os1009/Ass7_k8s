apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-monitor
spec:
  selector:
    matchLabels:
      app: node-monitor
  template:
    metadata:
      labels:
        app: node-monitor
    spec:
      containers:
        - name: monitor
          image: busybox:latest
          command: ["/bin/sh", "-c", "while true; do echo monitoring-node-$(hostname); sleep 30; done"]
